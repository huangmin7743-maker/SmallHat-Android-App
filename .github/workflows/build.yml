name: Build SmallHat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "JAVA_HOME_17_X64=$JAVA_HOME_17_X64"
          which java
          java -version 2>&1
          ls -la gradlew
          head -5 gradlew

      - name: Build APK
        run: |
          chmod +x gradlew
          # Try different JAVA_HOME possibilities
          export JAVA_HOME=${JAVA_HOME:-$JAVA_HOME_17_X64}
          $JAVA_HOME/bin/java -version 2>&1 || echo "No java in JAVA_HOME"
          ./gradlew assembleDebug --no-daemon 2>&1
          echo "BUILD_STATUS=$?"
        shell: bash

      - name: Find APK
        if: always()
        run: |
          find . -path "*/build/outputs/*" -type f
          mkdir -p /tmp/apk-output
          find . -name "*.apk" -type f -exec cp {} /tmp/apk-output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmallHat-APK
          path: /tmp/apk-output/
          retention-days: 30
