<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>SmallHat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0f0f1a;color:#e0e0e0;overflow:hidden;height:100vh}

/* 工具栏 - 底部浮动 */
.toolbar {
  position:fixed;bottom:0;left:0;right:0;
  display:flex;background:#1a1a2e;border-top:1px solid #2a2a4a;
  padding:4px 0;padding-bottom:env(safe-area-inset-bottom,4px);
  z-index:9999;
}
.toolbar .tab {
  flex:1;text-align:center;padding:6px 4px;cursor:pointer;
  color:#555;font-size:10px;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  transition:color .2s;
  border:none;background:none;
}
.toolbar .tab .icon{font-size:20px}
.toolbar .tab.active{color:#f7971e}
.toolbar .tab .badge{background:#ff4444;color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;position:absolute;top:0;right:50%;margin-right:-20px}

/* Telegram Web 容器 */
#telegramFrame {
  width:100%;height:100%;border:none;
  position:fixed;top:0;left:0;right:0;bottom:0;
  margin-bottom:60px;z-index:1;
}

/* 工具箱页面 */
#toolsPage {
  position:fixed;top:0;left:0;right:0;bottom:60px;
  z-index:2;display:none;overflow-y:auto;
  background:#0f0f1a;padding:20px 16px;
}
#toolsPage.show{display:block}

.tools-header{font-size:24px;font-weight:bold;margin-bottom:4px;background:linear-gradient(45deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tools-sub{color:#555;font-size:13px;margin-bottom:20px}
.tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.tool-card{
  background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;
  padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s
}
.tool-card:active{transform:scale(0.95)}
.tool-card .icon{font-size:28px;margin-bottom:8px}
.tool-card h3{font-size:14px;color:#e0e0e0;margin-bottom:4px}
.tool-card p{font-size:11px;color:#666}

/* 个人中心 */
#profilePage {
  position:fixed;top:0;left:0;right:0;bottom:60px;
  z-index:2;display:none;overflow-y:auto;
  background:#0f0f1a;padding:20px 16px;
}
#profilePage.show{display:block}

.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(45deg,#f7971e,#ffd200);display:flex;align-items:center;justify-content:center;font-size:36px;color:#000;margin:20px auto 12px}
.profile-name{font-size:20px;font-weight:bold;text-align:center}
.profile-id{font-size:13px;color:#555;text-align:center;margin-bottom:24px}
.profile-menu{list-style:none}
.profile-menu li{display:flex;align-items:center;padding:14px 12px;border-bottom:1px solid #1a1a2e;cursor:pointer;font-size:14px;gap:12px}
.profile-menu li:active{background:#1a1a2e;border-radius:12px}
.profile-menu li .mi{font-size:18px}
.profile-menu li .arrow{margin-left:auto;color:#333;font-size:18px}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #f7971e;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:99999;display:none;white-space:nowrap}
#toast.show{display:block;animation:fadeInOut 2s}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<!-- Telegram Web -->
<iframe id="telegramFrame" src="about:blank"></iframe>

<!-- 底部工具栏 -->
<div class="toolbar" id="toolbar">
  <button class="tab active" onclick="switchTab('telegram')">
    <span class="icon">💬</span>消息
  </button>
  <button class="tab" onclick="switchTab('tools')">
    <span class="icon">🧰</span>工具
  </button>
  <button class="tab" onclick="switchTab('profile')">
    <span class="icon">👤</span>我的
  </button>
</div>

<!-- 工具箱 -->
<div id="toolsPage">
  <div class="tools-header">🧰 搞钱工具箱</div>
  <div class="tools-sub">连接一切 · 自动赚钱</div>
  <div class="tools-grid">
    <div class="tool-card" onclick="toolAction('bot')"><div class="icon">💰</div><h3>黄金信号</h3><p>XAUUSD 实时推送</p></div>
    <div class="tool-card" onclick="toolAction('orderflow')"><div class="icon">📊</div><h3>订单流</h3><p>BTC/ETH 买卖压力</p></div>
    <div class="tool-card" onclick="toolAction('ai')"><div class="icon">🤖</div><h3>AI 中转</h3><p>GPT-4o / Llama API</p></div>
    <div class="tool-card" onclick="toolAction('game')"><div class="icon">🎮</div><h3>GameStation</h3><p>50款游戏</p></div>
    <div class="tool-card" onclick="toolAction('astock')"><div class="icon">📈</div><h3>A股量化</h3><p>AI选股策略</p></div>
    <div class="tool-card" onclick="toolAction('arb')"><div class="icon">🪙</div><h3>搬砖监控</h3><p>跨所价差套利</p></div>
  </div>
</div>

<!-- 个人中心 -->
<div id="profilePage">
  <div class="profile-avatar">H</div>
  <div class="profile-name">huangmin7743</div>
  <div class="profile-id">@huangmin7743</div>
  <ul class="profile-menu">
    <li><span class="mi">🔑</span> API Key<span class="arrow">›</span></li>
    <li><span class="mi">💰</span> 余额 <span style="color:#555;margin-left:auto;font-size:12px">¥0.00</span></li>
    <li><span class="mi">📊</span> 今日数据 <span style="color:#555;margin-left:auto;font-size:12px">0 请求</span></li>
    <li><span class="mi">🔔</span> 通知设置 <span style="color:#555;margin-left:auto;font-size:12px">已开启</span></li>
    <li><span class="mi">🌙</span> 夜间模式 <span style="color:#555;margin-left:auto;font-size:12px">默认</span></li>
    <li><span class="mi">📦</span> 项目备份 <span style="color:#555;margin-left:auto;font-size:12px">MyProjects/</span></li>
    <li><span class="mi">⚙️</span> 设置</li>
  </ul>
</div>

<div id="toast"></div>

<script>
// 启动后加载 Telegram Web
setTimeout(() => {
  document.getElementById('telegramFrame').src = 'https://web.telegram.org/k/';
}, 500);

// Tab 切换
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  
  document.getElementById('toolsPage').classList.remove('show');
  document.getElementById('profilePage').classList.remove('show');
  document.getElementById('telegramFrame').style.display = 'none';
  
  if (tab === 'telegram') {
    document.getElementById('telegramFrame').style.display = 'block';
  } else if (tab === 'tools') {
    document.getElementById('toolsPage').classList.add('show');
  } else if (tab === 'profile') {
    document.getElementById('profilePage').classList.add('show');
  }
}

// 工具操作
function toolAction(action) {
  const urls = {
    bot: 'https://t.me/mydfjjgold_bot',
    orderflow: null,
    ai: 'https://t.me/mydfjjgold_bot',
    game: 'https://t.me/mydfjjgold_bot',
    astock: null,
    arb: null
  };
  
  if (urls[action]) {
    document.getElementById('telegramFrame').src = urls[action];
    switchTab('telegram');
    showToast('🔗 已跳转到 Telegram');
  } else {
    showToast('⚡ 功能开发中...');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 防止 Telegram Web 劫持返回键
window.addEventListener('hashchange', (e) => {
  e.preventDefault();
});
</script>
</body>
</html>
