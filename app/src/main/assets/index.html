<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SmallHat ✦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* ====== 启动页 ====== */
.splash{position:fixed;inset:0;background:#0f0f1a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s;pointer-events:none}
.splash.hide{opacity:0}
.splash .logo{font-size:64px;animation:pulse 1.5s infinite}
.splash h1{background:linear-gradient(45deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:28px;margin-top:16px}
.splash p{color:#555;font-size:14px;margin-top:8px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* ====== 主体布局 ====== */
.app{display:none;flex-direction:column;height:100vh}

/* ====== 顶部栏 ====== */
.topbar{background:#1a1a2e;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2a4a;flex-shrink:0;padding-top:env(safe-area-inset-top,12px);min-height:56px}
.topbar .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f7971e,#ffd200);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;color:#000;flex-shrink:0}
.topbar .title{flex:1}
.topbar .title h2{font-size:17px;color:#e0e0e0;font-weight:600}
.topbar .title span{font-size:11px;color:#555}
.topbar .actions{display:flex;gap:6px}
.topbar .actions button{background:none;border:none;color:#666;font-size:18px;padding:6px;border-radius:8px;cursor:pointer}
.topbar .actions button:active{background:#2a2a4a}

/* ====== 底部导航 ====== */
.bottombar{display:flex;background:#1a1a2e;border-top:1px solid #2a2a4a;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.bottombar .tab{flex:1;text-align:center;padding:6px 4px 4px;cursor:pointer;color:#555;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:1px;transition:color .2s;border:none;background:none}
.bottombar .tab .icon{font-size:22px}
.bottombar .tab.active{color:#f7971e}
.bottombar .tab .badge{background:#ff4444;color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;position:absolute;top:-2px;right:-8px;line-height:1.4}

/* ====== 页面容器 ====== */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;scroll-behavior:smooth}
.page.active{display:block}

/* ====== 聊天列表 ====== */
.chat-list{list-style:none}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s}
.chat-item:active{background:#1a1a2e}
.chat-item .ca{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative}
.chat-item .ca .dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;border:2px solid #0f0f1a}
.chat-item .ca .dot.on{background:#4ade80}
.chat-item .ca .dot.off{background:#333}
.chat-item .ci{flex:1;min-width:0}
.chat-item .ci h3{font-size:16px;color:#e0e0e0;margin-bottom:3px;font-weight:500}
.chat-item .ci p{font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item .cm{text-align:right;flex-shrink:0}
.chat-item .cm .t{font-size:11px;color:#444}
.chat-item .cm .u{background:#f7971e;color:#000;font-size:11px;border-radius:10px;padding:1px 7px;font-weight:bold;display:inline-block;margin-top:4px}

/* ====== 聊天界面 ====== */
.chat-view{display:none;flex-direction:column;height:100%;position:absolute;inset:0;z-index:10;background:#0f0f1a}
.chat-view.active{display:flex}
.chat-top{display:flex;align-items:center;padding:8px 12px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;gap:10px;padding-top:env(safe-area-inset-top,8px)}
.chat-top .back{background:none;border:none;color:#f7971e;font-size:24px;padding:4px;cursor:pointer}
.chat-top .ca{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.chat-top .ti{flex:1}
.chat-top .ti h3{font-size:16px;color:#e0e0e0}
.chat-top .ti span{font-size:11px;color:#555}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;background:#0f0f1a}
.msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word;position:relative}
.msg.in{align-self:flex-start;background:#1a1a2e;border-bottom-left-radius:4px;color:#e0e0e0}
.msg.out{align-self:flex-end;background:linear-gradient(135deg,#f7971e,#e08800);border-bottom-right-radius:4px;color:#000}
.msg .mt{font-size:10px;color:inherit;opacity:0.4;margin-top:4px;display:block;text-align:right}
.date-divider{text-align:center;font-size:11px;color:#333;padding:8px 0}
.chat-input{display:flex;gap:8px;padding:8px 12px;background:#1a1a2e;border-top:1px solid #2a2a4a;flex-shrink:0}
.chat-input input{flex:1;padding:10px 16px;border-radius:24px;border:1px solid #3a3a5a;background:#16213e;color:#fff;font-size:14px;outline:none}
.chat-input input:focus{border-color:#f7971e}
.chat-input .send{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#f7971e,#e08800);color:#000;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ====== 通讯录 ====== */
.contacts-list{list-style:none}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer}
.contact-item:active{background:#1a1a2e}
.contact-item .ca{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.contact-item .ci{flex:1}
.contact-item .ci h3{font-size:15px;color:#e0e0e0;margin-bottom:2px}
.contact-item .ci p{font-size:12px;color:#555}
.section-header{padding:8px 16px;font-size:12px;color:#555;font-weight:600;text-transform:uppercase}

/* ====== 工具页 ====== */
.tools-header{padding:20px 16px 4px}
.tools-header h2{font-size:24px;font-weight:700;background:linear-gradient(45deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tools-header p{color:#555;font-size:13px;margin-top:4px}
.tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px}
.tool-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .15s}
.tool-card:active{transform:scale(0.96);border-color:#f7971e}
.tool-card .icon{font-size:36px;margin-bottom:10px;display:block}
.tool-card h3{font-size:15px;color:#e0e0e0;margin-bottom:4px}
.tool-card p{font-size:11px;color:#555}

/* ====== 个人中心 ====== */
.profile-header{padding:30px 16px 20px;text-align:center}
.profile-header .pa{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#f7971e,#ffd200);display:flex;align-items:center;justify-content:center;font-size:36px;color:#000;margin:0 auto 12px}
.profile-header h2{font-size:20px;font-weight:600}
.profile-header p{color:#555;font-size:13px;margin-top:4px}
.profile-menu{list-style:none}
.profile-menu li{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;font-size:14px;border-bottom:1px solid #111}
.profile-menu li:active{background:#1a1a2e;border-radius:12px}
.profile-menu li .mi{font-size:18px;width:24px;text-align:center}
.profile-menu li .val{margin-left:auto;color:#555;font-size:12px}
.profile-menu li .ar{color:#333;font-size:16px;margin-left:8px}

/* ====== Toast ====== */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #f7971e;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;z-index:99999;display:none;white-space:nowrap}
#toast.show{display:block;animation:fadeInOut 2s}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
</style>
</head>

// ====== 渲染 ======
function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = CHATS.map(c => `
    <li class="chat-item" onclick="openChat(${c.id})">
      <div class="ca" style="background:${c.color}22">
        ${c.avatar}
        <div class="dot ${c.online?'on':'off'}"></div>
      </div>
      <div class="ci">
        <h3>${c.name}</h3>
        <p>${c.lastMsg}</p>
      </div>
      <div class="cm">
        <div class="t">${c.time}</div>
        ${c.unread ? `<div class="u">${c.unread}</div>` : ''}
      </div>
    </li>
  `).join("");
}

function renderContacts() {
  const list = document.getElementById("contactsList");
  list.innerHTML = CONTACTS.map(c => `
    <li class="contact-item">
      <div class="ca" style="background:${c.color}22">${c.avatar}</div>
      <div class="ci">
        <h3>${c.name}</h3>
        <p>${c.status}</p>

  `).join("");
}

function renderTools() {
  const grid = document.getElementById("toolsGrid");

// ====== Tab切换 ======
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(`.tab`).forEach(t => {
    if(t.textContent.trim().includes({chats:"消息",contacts:"通讯录",tools:"工具",profile:"我的"}[tab])) t.classList.add("active");
  });
  
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const map = {chats:"pageChats",contacts:"pageContacts",tools:"pageTools",profile:"pageProfile"};
  document.getElementById(map[tab]).classList.add("active");
  
  const titles = {chats:"SmallHat",contacts:"通讯录",tools:"搞钱工具箱",profile:"个人中心"};
  document.getElementById("topTitle").textContent = titles[tab];
  document.getElementById("topSub").textContent = tab==='contacts'?'12位联系人':tab==='tools'?'6个工具就绪':tab==='profile'?'':'✦ 在线 '+onlineCount+' 人';
  
  closeChat();
}

// ====== 聊天 ======
let currentChat = null;

function openChat(id) {
  const chat = CHATS.find(c => c.id === id);
  if (!chat) return;
  currentChat = chat;
  chat.unread = 0;
  
  document.getElementById("chatUserName").textContent = chat.name;
  document.getElementById("chatUserStatus").textContent = chat.online ? '在线' : '离线';
  document.getElementById("chatAvatar").textContent = chat.avatar;
  document.getElementById("chatAvatar").style.background = chat.color+'22';
  
  const view = document.getElementById("chatView");
  view.classList.add("active");
  
  const msgs = document.getElementById("chatMessages");
  msgs.innerHTML = chat.messages.map(m => 
    `<div class="msg ${m.type}">${m.text.replace(/\n/g,'<br>')}<span class="mt">${m.time}</span></div>`
  ).join("");
  msgs.scrollTop = msgs.scrollHeight;
  
  renderChats();
  checkBadge();
}

function closeChat() {
  document.getElementById("chatView").classList.remove("active");
}

function checkBadge() {
  const total = CHATS.reduce((s,c) => s + c.unread, 0);
  const badge = document.getElementById("chatBadge");
  badge.style.display = total > 0 ? "inline" : "none";
  badge.textContent = total > 99 ? "99+" : total;
}

// ====== Toast ======
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}
