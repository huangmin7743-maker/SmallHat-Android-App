<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SmallHat</title>
<style>
:root {
  --bg: #0a0a14;
  --card: #12121e;
  --card2: #1a1a2e;
  --border: #1e1e36;
  --text: #f0f0f0;
  --text2: #8888aa;
  --text3: #555577;
  --accent: #f7971e;
  --accent2: #ff6b35;
  --green: #4ade80;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #a855f7;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tab-height: 64px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ===== SPLASH ===== */
.splash {
  position: fixed; inset: 0; background: var(--bg); z-index: 99999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1);
}
.splash.hide { opacity: 0; pointer-events: none; }
.splash-logo { width: 96px; height: 96px; border-radius: 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 48px; box-shadow: 0 8px 40px rgba(247,151,30,0.3); animation: splashPulse 2s ease-in-out infinite; }
@keyframes splashPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.splash h1 { margin-top: 20px; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.splash p { color: var(--text3); font-size: 14px; margin-top: 6px; }

/* ===== APP SHELL ===== */
.app-shell { display: none; flex-direction: column; height: 100vh; }

/* ===== HEADER ===== */
.header {
  padding-top: var(--safe-top); background: var(--bg);
  padding-left: 16px; padding-right: 16px; padding-bottom: 10px;
  flex-shrink: 0;
}
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; margin-top: 4px; }
.header-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #000; flex-shrink: 0; }
.header-info { flex: 1; }
.header-info h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header-info span { font-size: 12px; color: var(--text3); }
.header-actions { display: flex; gap: 4px; }
.header-actions button { width: 38px; height: 38px; border: none; background: var(--card); border-radius: 12px; color: var(--text2); font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.header-actions button:active { background: var(--card2); transform: scale(0.92); }
.search-bar { display: flex; align-items: center; gap: 8px; background: var(--card); border-radius: 12px; padding: 0 14px; height: 40px; border: 1px solid var(--border); }
.search-bar .icon { color: var(--text3); font-size: 16px; }
.search-bar input { flex: 1; background: none; border: none; color: var(--text); font-size: 14px; outline: none; }
.search-bar input::placeholder { color: var(--text3); }

/* ===== PAGES ===== */
.pages { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; display: none; -webkit-overflow-scrolling: touch; }
.page.active { display: block; }
.page-content { padding: 4px 16px 16px; }

/* ===== HOME PAGE ===== */
.banner { height: 160px; border-radius: 16px; background: linear-gradient(135deg, #1a1a3e, #2a1a1e); margin-bottom: 20px; overflow: hidden; position: relative; padding: 24px; display: flex; flex-direction: column; justify-content: flex-end; }
.banner h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.banner p { font-size: 13px; color: var(--text2); }
.banner .tag { display: inline-block; background: var(--accent); color: #000; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 8px; width: fit-content; }
.section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title h3 { font-size: 17px; font-weight: 600; }
.section-title a { color: var(--text3); font-size: 13px; text-decoration: none; }
.featured-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.featured-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 4px; background: var(--card); border-radius: 14px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); }
.featured-item:active { transform: scale(0.94); border-color: var(--accent); }
.featured-item .icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.featured-item span { font-size: 11px; color: var(--text2); text-align: center; }
.tool-list { display: flex; flex-direction: column; gap: 10px; }
.tool-row { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--card); border-radius: 14px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
.tool-row:active { transform: scale(0.97); border-color: var(--accent); }
.tool-row .icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.tool-row .info { flex: 1; }
.tool-row .info h4 { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
.tool-row .info p { font-size: 12px; color: var(--text3); }
.tool-row .arrow { color: var(--text3); font-size: 18px; }

/* ===== CHAT PAGE ===== */
.quick-actions { display: flex; gap: 10px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.qa-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 16px; background: var(--card); border-radius: 14px; border: 1px solid var(--border); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
.qa-item:active { transform: scale(0.95); }
.qa-item .icon { font-size: 20px; }
.qa-item span { font-size: 11px; color: var(--text2); }
.chat-list { list-style: none; }
.chat-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--card); cursor: pointer; transition: background 0.15s; }
.chat-item:active { background: var(--card); margin: 0 -16px; padding: 14px 16px; border-radius: 14px; }
.chat-item .ca { width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; position: relative; }
.chat-item .ca .dot { position: absolute; bottom: -1px; right: -1px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid var(--bg); }
.chat-item .ca .dot.on { background: var(--green); }
.chat-item .ca .dot.off { background: #333; }
.chat-item .ci { flex: 1; min-width: 0; }
.chat-item .ci h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.chat-item .ci p { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-item .cm { text-align: right; flex-shrink: 0; }
.chat-item .cm .t { font-size: 11px; color: var(--text3); }
.chat-item .cm .u { background: var(--accent); color: #000; font-size: 11px; border-radius: 8px; padding: 1px 7px; font-weight: 700; display: inline-block; margin-top: 4px; min-width: 20px; text-align: center; }

/* ===== EXPLORE PAGE ===== */
.category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.category-card { padding: 16px; border-radius: 16px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
.category-card:active { transform: scale(0.96); }
.category-card .icon { font-size: 32px; margin-bottom: 8px; display: block; }
.category-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.category-card p { font-size: 11px; color: var(--text3); }
.recommend-card { display: flex; gap: 14px; padding: 14px; background: var(--card); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; transition: all 0.15s; }
.recommend-card:active { transform: scale(0.98); }
.recommend-card .thumb { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.recommend-card .info { flex: 1; }
.recommend-card .info h4 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.recommend-card .info p { font-size: 12px; color: var(--text3); line-height: 1.5; }

/* ===== PROFILE PAGE ===== */
.profile-header { text-align: center; padding: 20px 0 14px; }
.profile-avatar { width: 80px; height: 80px; border-radius: 22px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 36px; color: #000; margin: 0 auto 12px; box-shadow: 0 4px 20px rgba(247,151,30,0.2); }
.profile-header h2 { font-size: 20px; font-weight: 700; }
.profile-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }
.profile-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--card); border-radius: 14px; padding: 14px; text-align: center; border: 1px solid var(--border); }
.stat-card .num { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat-card .label { font-size: 11px; color: var(--text3); margin-top: 4px; }
.menu-list { list-style: none; background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
.menu-item { display: flex; align-items: center; gap: 12px; padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: var(--card2); }
.menu-item .mi { font-size: 18px; width: 24px; text-align: center; }
.menu-item .mn { flex: 1; font-size: 14px; }
.menu-item .mv { color: var(--text3); font-size: 12px; }
.menu-item .ar { color: var(--text3); font-size: 16px; }

/* ===== BOTTOM TABS ===== */
.bottombar {
  display: flex; background: rgba(10,10,20,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: var(--safe-bottom);
  height: var(--tab-height);
}
.bottombar .tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; color: var(--text3); font-size: 10px; transition: color 0.2s;
  border: none; background: none; position: relative;
}
.bottombar .tab .icon { font-size: 22px; transition: transform 0.2s; }
.bottombar .tab.active { color: var(--accent); }
.bottombar .tab.active .icon { transform: scale(1.1); }
.bottombar .tab .badge { position: absolute; top: 2px; background: var(--red); color: #fff; font-size: 10px; border-radius: 8px; padding: 1px 5px; line-height: 1.3; min-width: 16px; text-align: center; }

/* ===== TRANSITIONS ===== */
.slide-up { animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== SCROLLBAR ===== */
.page::-webkit-scrollbar { width: 0; }
</style>
</head>

<script>
// ====== DATA ======
const FEATURED = [

const CHATS = [

  { id:5, name:'A股量化引擎', avatar:'📈', last:'今日推荐宁德时代', time:'09:00', unread:0, online:true, color:'#ef4444', msg:[{t:'in',text:'📈 AI选股\n宁德时代(300750) 目标280',time:'09:00'}] },

const CATEGORIES = [

// ====== RENDER ======
function renderFeatured() {
  document.getElementById('featuredGrid').innerHTML = FEATURED.map(f =>
    `<div class="featured-item" onclick="toolAction('${f.action}')">
      <div class="icon" style="background:${f.bg}">${f.icon}</div>
      <span>${f.name}</span>
    </div>`
  ).join('');
  document.getElementById('newsList').innerHTML = NEWS.map(n =>
    `<div class="tool-row">
      <div class="icon" style="background:${n.bg}">${n.icon}</div>
      <div class="info"><h4>${n.title}</h4><p>${n.desc}</p></div>
      <span class="arrow">›</span>
    </div>`
  ).join('');
}

function renderChats() {
  document.getElementById('quickActions').innerHTML = ['💰黄金信号','🤖AI','📊订单流','✦助手'].map(s =>
    `<div class="qa-item"><span class="icon">${s.slice(0,2)}</span><span>${s.slice(2)}</span></div>`
  ).join('');
  document.getElementById('chatList').innerHTML = CHATS.map(c =>
    `<li class="chat-item" onclick="openChat(${c.id})">
      <div class="ca" style="background:${c.color}22">${c.avatar}<div class="dot ${c.online?'on':'off'}"></div></div>
      <div class="ci"><h3>${c.name}</h3><p>${c.last}</p></div>
      <div class="cm"><div class="t">${c.time}</div>${c.unread?`<div class="u">${c.unread}</div>`:''}</div>
    </li>`
  ).join('');
}

function renderExplore() {
  document.getElementById('categoryGrid').innerHTML = CATEGORIES.map(c =>
    `<div class="category-card" style="background:${c.color}08;border-color:${c.color}22">
      <span class="icon">${c.icon}</span>
      <h4>${c.name}</h4>
      <p>${c.desc}</p>
    </div>`
  ).join('');
  document.getElementById('recommendList').innerHTML = RECOMMENDS.map(r =>
    `<div class="recommend-card">
      <div class="thumb" style="background:${r.bg}">${r.thumb}</div>
      <div class="info"><h4>${r.title}</h4><p>${r.desc}</p></div>
    </div>`
  ).join('');
}



// ====== TAB ======
let currentTab = 0;
const TITLES = ['SmallHat','消息','发现','我的'];
const SUBS = ['✦ 在线 128 人','7个频道','6个分类','个人中心'];

function switchTab(i) {
  currentTab = i;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[i].classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pages = ['pageHome','pageChat','pageExplore','pageProfile'];
  document.getElementById(pages[i]).classList.add('active');
  document.getElementById('pageTitle').textContent = TITLES[i];
  document.getElementById('pageSub').textContent = SUBS[i];
}

// ====== CHAT ======
function openChat(id) {
  const c = CHATS.find(x=>x.id===id);
  if(!c) return;
  showToast('打开 '+c.name);
}

// ====== TOOLS ======
function toolAction(a) {
  const m = {bot:'打开黄金信号',flow:'打开订单流',game:'打开GameStation',ai:'打开AI中转'};
  showToast('⏳ '+ (m[a]||'开发中...'));
}

// ====== SHEET ======
function showSheet(type) {
  showToast(type==='search'?'🔍 搜索':'➕ 添加');
}

// ====== TOAST ======
let toastEl,toastTimer;
function showToast(msg) {
  if(!toastEl) {
    toastEl = document.createElement('div');
    toastEl.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #333;color:#fff;padding:10px 24px;border-radius:12px;font-size:13px;z-index:99999;display:none;backdrop-filter:blur(20px)';
    document.body.appendChild(toastEl);
  }
  toastEl.textContent = msg;
  toastEl.style.display = 'block';
  toastEl.style.animation = 'none';
  toastEl.offsetHeight;
  toastEl.style.animation = 'fadeInOut 2s';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.style.display='none', 2000);
}

// ====== STYLE DYNAMIC ======
const style = document.createElement('style');
style.textContent = `@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}`;
document.head.appendChild(style);

// ====== INIT ======
setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  document.getElementById('app').style.display = 'flex';
}, 1500);

function renderProfile() {
  var menu = document.getElementById("menuList");
  menu.innerHTML = MENUS.map(function(m) {
    var val = m.val ? "<span class=\"mv\">" + m.val + "</span>" : "";
    return "<li class=\"menu-item\"><span class=\"mi\">" + m.icon + "</span><span class=\"mn\">" + m.name + "</span>" + val + "<span class=\"ar\">›</span></li>";
  }).join("");
}
renderFeatured(); renderChats(); renderExplore(); renderProfile();
</script>
